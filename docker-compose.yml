services:

  # ── Core API ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./process-dash-core-api
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./process-dash-data:/data
      - ./process-dash-backups:/backups
    environment:
      - WORKOBS_DB_PATH=/data/workobs.sqlite
      - WORKOBS_BACKUP_DIR=/backups
      - WORKOBS_DB_STRICT_PATH=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - process-dash-net

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./process-dash-frontend/beta
      dockerfile: Dockerfile
    ports:
      - "5051:5173"
    environment:
      - VITE_API_BASE=http://localhost:8001/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - process-dash-net

  # ── MCP Server ──────────────────────────────────────────────────────────────
  # Wraps the core API as MCP tools over SSE.
  # Claude Desktop users: run `python server.py` (stdio) instead.
  mcp:
    build:
      context: ./process-dash-core-mcp
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - CORE_API_BASE_URL=http://backend:8000/api
      - PORT=3100
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3100/sse')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - process-dash-net

  # ── Copilot ─────────────────────────────────────────────────────────────────
  # FastAPI chat service — POST /chat with {message, sessionId}.
  # Set LLM_BASE_URL + LLM_MODEL + LLM_API_KEY via a .env file or environment.
  # Option A: Ollama — uncomment the ollama service below, set LLM_BASE_URL=http://ollama:11434/v1
  # Option B: Any OpenAI-compatible cloud endpoint — set LLM_BASE_URL + LLM_API_KEY
  copilot:
    build:
      # Context is repo root so Dockerfile can reach process-dash-core-mcp/api_client.py
      context: .
      dockerfile: process-dash-copilot/Dockerfile
    ports:
      - "3200:3200"
    environment:
      - CORE_API_BASE_URL=http://backend:8000/api
      - MCP_SERVER_URL=http://mcp:3100
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-llama3}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - PORT=3200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3200/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
      mcp:
        condition: service_started
    networks:
      - process-dash-net

  # ── Ollama (optional local LLM) ─────────────────────────────────────────────
  # Uncomment to run a local model. After first `docker compose up`, pull a model:
  #   docker exec process-dash-ollama ollama pull llama3
  # Then set LLM_BASE_URL=http://ollama:11434/v1 and LLM_MODEL=llama3 in .env
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: process-dash-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - process-dash-net

networks:
  process-dash-net:
    driver: bridge

